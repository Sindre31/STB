name: Oppdater aksjedata

# Henter ferske kurser fra Yahoo Finance og pusher til main.
# Vercel bygger siden på nytt automatisk ved push til main.

on:
  schedule:
    # Kl. 16:00 UTC på ukedager – etter at Oslo Børs har stengt (ca. 16:20 lokal tid).
    - cron: "0 16 * * 1-5"
  workflow_dispatch:
    inputs:
      force_commit:
        description: "Tving en commit selv om dataene er uendret (for å teste push → Vercel-kjeden)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: update-stock-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4

      - name: Sett opp Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Hent ferske kurser
        run: node scripts/update-data.mjs

      - name: Generer AI-ekspertkommentar (hopper over hvis nøkkel mangler)
        run: node scripts/ai-commentary.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit og push hvis data er endret
        run: |
          git config user.name "stock-data-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- js/prices.js js/live.js js/ai-view.js js/newsfeed.js js/insiders.js js/targethistory.js && [ "${{ inputs.force_commit }}" != "true" ]; then
            echo "Ingen endringer i kursdata – hopper over commit."
          else
            git add js/prices.js js/live.js
            [ -f js/ai-view.js ] && git add js/ai-view.js || true
            [ -f js/newsfeed.js ] && git add js/newsfeed.js || true
            [ -f js/insiders.js ] && git add js/insiders.js || true
            [ -f js/targethistory.js ] && git add js/targethistory.js || true
            git commit --allow-empty -m "Auto-oppdater aksjedata ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Kursdata oppdatert og pushet til main."
          fi
